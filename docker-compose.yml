version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: testing
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - net

  java-app:
  build: .
  container_name: app
  restart: always
  depends_on:
    - mysql
  ports:
    - "8080:8080"
  networks:
    - net
  environment:
    SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/testing
    SPRING_DATASOURCE_USERNAME: root
    SPRING_DATASOURCE_PASSWORD: 1234

networks:
  net:
    driver: bridge

volumes:
  mysql_data: